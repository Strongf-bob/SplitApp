<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">SplitApp — shared expenses, from receipt to settlement</title>
  <desc id="desc">A native iOS receipt is split between participants and resolves into a balanced settlement.</desc>
  <rect width="1200" height="390" rx="28" fill="#F7F8FC"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="56" y="65" fill="#315EF5" font-size="18" font-weight="800" letter-spacing="3">NATIVE iOS · SWIFTUI</text>
    <text x="56" y="150" fill="#141B2D" font-size="72" font-weight="780">SplitApp</text>
    <text x="56" y="199" fill="#4C6096" font-size="26">Чеки, доли, балансы и платежи для общих событий.</text>
    <g transform="translate(56 258)" font-size="18" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <text x="0" y="24" fill="#1F387C">RECEIPT</text><text x="94" y="24" fill="#7988B0">→</text>
      <text x="128" y="24" fill="#1F387C">SHARES</text><text x="216" y="24" fill="#7988B0">→</text>
      <text x="250" y="24" fill="#1F387C">BALANCE</text><text x="350" y="24" fill="#7988B0">→</text>
      <text x="384" y="24" fill="#4AB783">SETTLED</text>
    </g>
    <g transform="translate(800 34)">
      <rect x="34" y="18" width="254" height="310" rx="42" fill="#FFFFFF" stroke="#E4E8F2" stroke-width="4"/>
      <rect x="72" y="54" width="178" height="84" rx="20" fill="#1F387C"/>
      <text x="161" y="88" fill="#C5D1FF" font-size="17" text-anchor="middle">ОБЩИЙ БАЛАНС</text>
      <text x="161" y="120" fill="#FFFFFF" font-size="28" font-weight="800" text-anchor="middle">+ ₽ 1 240</text>
      <circle cx="92" cy="206" r="28" fill="#FFB5A7"/><circle cx="161" cy="206" r="28" fill="#A7D8FF"/><circle cx="230" cy="206" r="28" fill="#D4C5F9"/>
      <path d="M92 236C102 280 138 286 161 250M230 236C220 280 184 286 161 250" fill="none" stroke="#315EF5" stroke-width="4"/>
      <circle cx="161" cy="250" r="10" fill="#4AB783"/>
      <text x="161" y="306" fill="#4C6096" font-size="16" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">3 PARTICIPANTS</text>
    </g>
  </g>
</svg>
